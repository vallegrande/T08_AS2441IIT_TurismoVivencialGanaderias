<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turismo Vivencial - Login</title>
  <link rel="stylesheet" href="login-form.component.scss" />
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h2 class="title">TURISMO VIVENCIAL</h2>

      <label for="email">Correo Electrónico:</label>
      <input type="email" id="email" />

      <label for="password">Contraseña:</label>
      <div class="password-wrapper">
        <input type="password" id="password" />
        <span class="toggle-password">👁️</span>
      </div>

      <a class="forgot-password" href="#">¿Olvidaste tu contraseña?</a>

      <button class="btn login">INICIAR SESIÓN</button>

      <p class="or-text">También puedes acceder con:</p>

      <button class="btn google">CONTINUAR CON GOOGLE</button>
      <button class="btn facebook">CONTINUAR CON FACEBOOK</button>

      <p class="register-text">¿Aún no tienes cuenta?</p>

      <button class="btn register">CREAR CUENTA</button>
    </div>
  </div>
</body>
</html>
