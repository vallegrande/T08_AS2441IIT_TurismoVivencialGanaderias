<main class="contact-section">
  <div class="contact-header">
    <img src="/images/contact-us/imgContactBanner01.jpg" alt="Banner" class="banner-image">
    <h1 class="contact-title">Contáctanos</h1>
  </div>
  <div class="contact-container">
    <img src="/images/contact-us/toroContactUs01.png" alt="Decoración izquierda" class="contact-deco deco-left">

    <form class="contact-form">
      <div class="form-group">
        <label for="firstName">
          <i class="icon icon-user"></i>
          Nombres Completos
        </label>
        <input type="text" id="firstName" name="firstName" required>
      </div>
      <div class="form-group">
        <label for="lastName">
          <i class="icon icon-user"></i>
          Apellidos Completos
        </label>
        <input type="text" id="lastName" name="lastName" required>
      </div>
      <div class="form-group">
        <label for="phone">
          <i class="icon icon-phone"></i>
          Número de Teléfono
        </label>
        <input type="tel" id="phone" name="phone" required>
      </div>
      <div class="form-group full-width">
        <label for="message">
          <i class="icon icon-message"></i>
          Mensaje
        </label>
        <textarea id="message" name="message" rows="4" required></textarea>
      </div>
      <button type="submit" class="submit-button">Enviar</button>
    </form>

    <img src="/images/contact-us/imgContactForm01.jpg" alt="Ganadería" class="form-image">
    <img src="/images/contact-us/galloContactUs01.png" alt="Decoración derecha" class="contact-deco deco-right">
  </div>
</main>
